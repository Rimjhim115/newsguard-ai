# frontend/nginx.conf
# PURPOSE: nginx configuration for serving React app.
#
# The try_files directive is crucial for React Router.
# Without it, refreshing /dashboard gives a 404
# because nginx looks for a /dashboard folder that doesn't exist.
# try_files tells nginx: "if the file doesn't exist, serve index.html"
# React Router then handles the routing on the client side.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}